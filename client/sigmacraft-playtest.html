<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World of Sigmacraft — Playtest</title>
<style>
  :root {
    --bg-0: #0a0d0c; --bg-1: #131a17; --bg-2: #1d2723; --bg-3: #2a352f; --line: rgba(200,215,205,.14);
    --text: #ecf2ed; --muted: #9fb0a6; --amber: #d8a657; --teal: #7fc4a5; --danger: #d77474;
    --shadow: 0 18px 44px rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(1200px 700px at 70% -10%, #1a2420, var(--bg-0) 70%);
    color: var(--text); font: 14px/1.5 system-ui, -apple-system, sans-serif; overflow: hidden;
  }
  body.dungeon-focus::before {
    content: ""; position: fixed; inset: 0; background: rgba(3,5,4,.72); z-index: 20; pointer-events: none;
  }
  header {
    display: flex; align-items: baseline; gap: 16px; padding: 10px 18px;
    border-bottom: 1px solid var(--line); background: rgba(0,0,0,.25);
  }
  header h1 { font-size: 16px; margin: 0; letter-spacing: .06em; color: var(--amber); }
  header .meta { color: var(--muted); font-size: 12px; }
  header .who { margin-left: auto; color: var(--teal); font-size: 12px; }
  #app { display: grid; grid-template-columns: 1fr 360px; gap: 12px; padding: 12px; height: calc(100% - 49px); }
  .panel {
    background: linear-gradient(180deg, var(--bg-2), var(--bg-1)); border: 1px solid var(--line);
    border-radius: 14px; box-shadow: var(--shadow); padding: 12px; overflow: hidden; display: flex; flex-direction: column;
  }
  .panel h2 { margin: 0 0 8px; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--amber); }
  .right { gap: 0; overflow-y: auto; }
  .right h2 { margin-top: 12px; }
  .right h2:first-child { margin-top: 0; }

  /* world map — grid tiles (vertical-slice style) */
  .map-meta { color: var(--muted); font-size: 11px; margin-bottom: 8px; }
  #map-stage { position: relative; flex: 1; min-height: 0; }
  #map-grid {
    display: grid; gap: 2px; height: 100%; min-height: 0; align-content: start;
  }
  #map-agents {
    position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none;
    image-rendering: pixelated; z-index: 5;
  }
  .map-cell {
    position: relative; aspect-ratio: 1; border: 1px solid rgba(0,0,0,.25); border-radius: 3px;
    cursor: default; overflow: hidden; min-width: 0; transition: filter .1s;
  }
  .map-cell .glyph { position: absolute; inset: 0; display: grid; place-items: center; color: rgba(255,255,255,.58); font-size: clamp(9px, 1.1vw, 16px); text-shadow: 0 1px 2px #000; }
  .map-cell .pin { position: absolute; inset: 0; display: grid; place-items: center; font-size: 11px; color: #fff; text-shadow: 0 1px 2px #000; }
  .map-cell .cnt { position: absolute; right: 1px; bottom: 0; font-size: 8px; color: rgba(255,255,255,.92); text-shadow: 0 1px 2px #000; line-height: 1; }
  .map-cell.exit { cursor: pointer; box-shadow: inset 0 0 0 1.5px rgba(127,196,165,.9); }
  .map-cell.exit:hover { filter: brightness(1.4); }
  .map-cell.current { box-shadow: 0 0 0 2px #fff; z-index: 2; }
  .map-legend { display: flex; flex-wrap: wrap; gap: 8px 12px; margin-top: 10px; color: var(--muted); font-size: 11px; }
  .map-legend .sw { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }

  /* small side-scroller pane */
  .scene-pane { position: relative; height: 238px; min-height: 238px; flex: 0 0 238px; border-radius: 8px; overflow: hidden; border: 1px solid var(--line); margin-bottom: 6px; }
  body.dungeon-focus .scene-pane {
    position: fixed; z-index: 30; left: 50%; top: 48%; transform: translate(-50%, -50%);
    width: min(1040px, 88vw); height: min(520px, 58vh); min-height: min(520px, 58vh); flex: none;
    box-shadow: 0 28px 90px rgba(0,0,0,.72), 0 0 0 1px rgba(216,166,87,.28);
  }
  #scene { display: block; width: 100%; height: 100%; }
  .scene-cap { position: absolute; left: 12px; bottom: 10px; text-shadow: 0 2px 8px #000; pointer-events: none; }
  .scene-cap .place { font-size: 17px; font-weight: 700; }
  .scene-cap .tierbadge { display: inline-block; font-size: 9px; padding: 2px 7px; border-radius: 999px; margin-top: 3px; }
  #result-card {
    display: none; position: absolute; right: 18px; top: 18px; width: min(360px, 42%); max-height: calc(100% - 36px);
    overflow-y: auto; z-index: 4; padding: 14px; border: 1px solid rgba(216,166,87,.36); border-radius: 8px;
    background: rgba(12,15,13,.88); box-shadow: 0 18px 44px rgba(0,0,0,.48);
  }
  #result-card.show { display: block; }
  .result-title { color: var(--amber); font-size: 22px; font-weight: 800; letter-spacing: .08em; }
  .loot-grid { display: grid; gap: 7px; margin-top: 10px; }
  .loot-card { padding: 8px; border: 1px solid var(--line); border-radius: 7px; background: rgba(255,255,255,.045); }
  .loot-card b { color: #f3dfac; }
  .speech {
    position: absolute; z-index: 3; max-width: 170px; padding: 5px 7px; border-radius: 7px;
    background: rgba(7,10,8,.82); border: 1px solid rgba(255,255,255,.16); color: #f1ead8;
    font-size: 11px; line-height: 1.25; box-shadow: 0 8px 18px rgba(0,0,0,.28);
  }
  .flavor { color: #cdd8d0; font-size: 12px; margin: 2px 0 0; }
  #planner-wrap {
    margin-top: 10px; padding: 9px; border: 1px solid rgba(216,166,87,.24);
    border-radius: 8px; background: rgba(216,166,87,.055);
  }
  .planner-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .planner-controls button.act { text-align: center; }
  .planner-controls button.active { border-color: var(--amber); background: rgba(216,166,87,.22); color: #ffe7ad; }
  #planner-health { margin-top: 8px; display: grid; gap: 6px; font-size: 11px; }
  .planner-top { display: flex; justify-content: space-between; gap: 8px; color: #f3dfac; }
  .planner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 8px; }
  .planner-metric { display: flex; justify-content: space-between; gap: 8px; color: var(--muted); }
  .planner-metric b { color: var(--text); }
  .planner-metric.bad b, .planner-warning.bad { color: var(--danger); }
  .planner-metric.good b, .planner-warning.good { color: var(--teal); }
  .queuebar { height: 6px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; }
  .queuebar i { display: block; height: 100%; background: linear-gradient(90deg, var(--teal), var(--amber), var(--danger)); }
  .planner-warning { padding-top: 2px; font-weight: 700; }

  .actions { display: flex; flex-direction: column; gap: 7px; }
  button.act {
    text-align: left; padding: 9px 11px; border-radius: 9px; cursor: pointer;
    background: rgba(127,196,165,.10); color: var(--text); border: 1px solid var(--line); font: inherit;
    transition: background .12s, border-color .12s;
  }
  button.act:hover { background: rgba(127,196,165,.22); border-color: var(--teal); }
  button.act.rest { background: rgba(216,166,87,.10); }
  button.act.talk { background: rgba(150,150,220,.12); }
  button.act.recruit { background: rgba(127,196,165,.14); }
  button.act.primary { background: rgba(216,166,87,.18); border-color: rgba(216,166,87,.35); font-weight: 700; }
  button.act.primary:disabled { opacity: .6; cursor: wait; }
  button.act.tiny { padding: .1rem .4rem; font-size: .8em; }
  #tavern-wrap { margin-top: .6rem; padding: .5rem; border: 1px solid rgba(127,196,165,.25); border-radius: 8px; background: rgba(127,196,165,.05); }
  .party-hd { font-weight: 600; margin-bottom: .3rem; }
  .party-list { list-style: none; padding: 0; margin: .2rem 0; }
  .party-list li { padding: .12rem 0; }
  .decision-grid { display: grid; gap: 4px; margin-top: 6px; }
  .decision { padding: 5px 7px; border: 1px solid var(--line); border-radius: 6px; background: rgba(255,255,255,.035); font-size: 12px; }
  .decision.yes { border-color: rgba(127,196,165,.28); }
  .decision.no { opacity: .68; }
  #dungeon-wrap { margin-top: .6rem; padding: .5rem; border: 1px solid rgba(215,116,116,.3); border-radius: 8px; background: rgba(215,116,116,.05); }
  button.act.delve { background: rgba(215,116,116,.18); width: 100%; margin: .4rem 0; font-weight: 600; }
  .combat { margin-top: .5rem; }
  .combat-hd { font-weight: 700; margin-bottom: .25rem; }
  .combat-loot ul, .combat-log { list-style: none; padding: .2rem 0 0; margin: 0; }
  .combat-loot li, .combat-log li { padding: .08rem 0; font-size: .92em; }
  .combat-log { max-height: 220px; overflow-y: auto; }
  .combat-log li.kill { color: var(--danger); }
  .wave-pills { display: flex; gap: 5px; flex-wrap: wrap; margin: 6px 0; }
  .wave-pill { font-size: 11px; padding: 3px 7px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); }
  .wave-pill.active { color: var(--text); border-color: var(--amber); background: rgba(216,166,87,.12); }
  .hp-strip { display: grid; gap: 4px; margin-top: 7px; }
  .hp-row { display: grid; grid-template-columns: 92px 1fr 38px; gap: 6px; align-items: center; font-size: 11px; color: var(--muted); }
  .hp-row .bar { height: 5px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; }
  .hp-row .bar i { display: block; height: 100%; background: linear-gradient(90deg, var(--teal), var(--amber)); }
  .hp-row.enemy .bar i { background: linear-gradient(90deg, var(--danger), #e7b45f); }
  .hp-group { display: grid; gap: 3px; }
  .hp-group b { color: #e7d9b8; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; }
  .pending { color: var(--amber); font-size: 12px; min-height: 16px; }
  .obj { font-size: 12px; color: #e7d9b8; border-left: 2px solid var(--amber); padding-left: 8px; margin: 4px 0; }
  .occ { color: var(--muted); font-size: 11px; }
  .occ b { color: var(--teal); }
  #events { list-style: none; margin: 6px 0 0; padding: 0; }
  #events li { padding: 5px 0; border-top: 1px solid var(--line); color: #cdd8d0; font-size: 12px; }
  #events li .t { color: var(--muted); font-size: 10px; margin-right: 6px; }
  .dim { color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>WORLD OF SIGMACRAFT</h1>
  <span class="meta" id="hdr-meta">connecting…</span>
  <span class="who" id="hdr-who"></span>
</header>
<div id="app">
  <section class="panel">
    <h2>Realm Map</h2>
    <div class="map-meta" id="map-meta"></div>
    <div id="map-stage">
      <div id="map-grid"></div>
      <canvas id="map-agents"></canvas>
    </div>
    <div class="map-legend" id="map-legend">
      <span>◆ you</span><span>tiny sprites: NPCs</span><span>✦ plan update</span><span>teal edge: travel</span>
    </div>
  </section>

  <section class="panel right">
    <div id="planner-wrap">
      <h2>Gemma Planner</h2>
      <div class="planner-controls">
        <button class="act tiny" id="btn-profile-cerebras">1800 tk/s</button>
        <button class="act tiny" id="btn-profile-slow50">50 tk/s sim</button>
      </div>
      <div id="planner-health"></div>
    </div>

    <h2>Your Surroundings</h2>
    <div class="scene-pane">
      <canvas id="scene"></canvas>
      <div id="result-card"></div>
      <div class="scene-cap">
        <div class="place" id="scene-place">—</div>
        <div class="tierbadge" id="scene-tier"></div>
      </div>
    </div>
    <p class="flavor" id="scene-flavor"></p>

    <div id="tavern-wrap" style="display:none">
      <h2>🍺 Tavern — Party Finding</h2>
      <div class="party" id="party"></div>
      <div class="recruits" id="recruits"></div>
    </div>

    <h2>Who's Here</h2>
    <div class="occ" id="occupants"></div>

    <h2>Actions</h2>
    <div class="pending" id="pending"></div>
    <div class="actions" id="actions"></div>

    <div id="dungeon-wrap" style="display:none">
      <h2>⚔ Dungeon</h2>
      <div id="dungeon-body"></div>
    </div>

    <h2>Recent Events</h2>
    <ul id="events"><li class="dim">the realm stirs…</li></ul>
  </section>
</div>

<script type="module">
import { composeAvatar, composeEnemy } from "/avatar/lpc-avatar.js";

const $ = (id) => document.getElementById(id);
let token = null;
let snap = null;
let fullMap = null; // static overworld, fetched once
let demoRun = null;
let plannerDemo = null;
let demoPending = false;
let demoCommitStarted = false;
let playbackStart = 0;
let playbackKey = "";
let lastFrameTs = 0;
let mapLayoutVersion = 0;
const mapNpcSprites = new Map();
const mapPlanTicks = new Map();
const mapCellRects = new Map();
const nonce = () => (crypto.randomUUID ? crypto.randomUUID() : String(Math.random())).slice(0, 24);
const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[ch]);

// tile type → map colour
const TYPE_COLOR = {
  town: "#d8a657", city: "#c08a3e", dungeon: "#7a3b2e", ruins: "#5a4a6b",
  shrine: "#5f7a8c", road: "#6b6452", wilds: "#2c4a36",
};
const TERRAIN_GLYPH = {
  village: "⌂", forge: "⚒", mine: "⌁", badlands: "◆", ruins: "▥", shrine: "✦",
  road: "═", river: "≈", forest: "♣", woods: "♣", meadow: "·", hills: "▴", ridge: "▵", mire: "≈",
};
function tileGlyph(t) {
  if (t.type === "town" || t.type === "city") return "⌂";
  if (t.type === "dungeon") return t.terrain === "mine" ? "⌁" : t.terrain === "forge" ? "⚒" : "◆";
  return TERRAIN_GLYPH[t.terrain] || TERRAIN_GLYPH[t.type] || "";
}
function tileBackground(t) {
  const base = TYPE_COLOR[t.type] || "#2c4a36";
  const terrain = t.terrain || t.type;
  const patterns = {
    village: `linear-gradient(135deg, rgba(255,235,164,.24) 0 20%, transparent 21% 100%), linear-gradient(45deg, transparent 0 44%, rgba(92,48,30,.45) 45% 56%, transparent 57% 100%), ${base}`,
    forge: `radial-gradient(circle at 62% 38%, rgba(255,166,83,.65) 0 9%, transparent 10%), linear-gradient(135deg, rgba(55,37,28,.45) 0 50%, transparent 51%), ${base}`,
    mine: `radial-gradient(circle at 40% 45%, rgba(230,230,255,.34) 0 8%, transparent 9%), linear-gradient(90deg, rgba(0,0,0,.24) 0 48%, transparent 49% 100%), ${base}`,
    badlands: `linear-gradient(160deg, rgba(255,178,105,.18) 0 18%, transparent 19% 38%, rgba(0,0,0,.18) 39% 46%, transparent 47%), ${base}`,
    forest: `radial-gradient(circle at 28% 30%, rgba(127,196,110,.48) 0 12%, transparent 13%), radial-gradient(circle at 70% 62%, rgba(102,165,88,.42) 0 14%, transparent 15%), ${base}`,
    woods: `radial-gradient(circle at 32% 36%, rgba(108,176,92,.48) 0 13%, transparent 14%), radial-gradient(circle at 68% 42%, rgba(58,112,60,.45) 0 16%, transparent 17%), ${base}`,
    meadow: `radial-gradient(circle at 35% 38%, rgba(231,216,116,.45) 0 5%, transparent 6%), radial-gradient(circle at 70% 66%, rgba(170,215,119,.38) 0 8%, transparent 9%), ${base}`,
    road: `linear-gradient(90deg, transparent 0 30%, rgba(213,185,126,.48) 31% 69%, transparent 70%), ${base}`,
    river: `linear-gradient(135deg, transparent 0 35%, rgba(118,166,190,.7) 36% 60%, transparent 61%), ${base}`,
    ruins: `linear-gradient(90deg, rgba(0,0,0,.18) 0 18%, transparent 19% 48%, rgba(255,255,255,.12) 49% 62%, transparent 63%), ${base}`,
    shrine: `radial-gradient(circle at 50% 42%, rgba(202,231,255,.55) 0 13%, transparent 14%), ${base}`,
    hills: `linear-gradient(135deg, transparent 0 25%, rgba(220,190,128,.26) 26% 44%, transparent 45%), ${base}`,
    ridge: `linear-gradient(135deg, rgba(0,0,0,.22) 0 24%, transparent 25% 52%, rgba(255,255,255,.12) 53% 65%, transparent 66%), ${base}`,
    mire: `radial-gradient(ellipse at 55% 62%, rgba(93,126,112,.55) 0 20%, transparent 21%), ${base}`,
  };
  return patterns[terrain] || base;
}

const mapCv = $("map-agents");
const mapCtx = mapCv.getContext("2d");
function refreshMapCellRects() {
  const stage = $("map-stage");
  if (!stage) return;
  const stageRect = stage.getBoundingClientRect();
  mapCellRects.clear();
  for (const cell of document.querySelectorAll(".map-cell[data-tile-id]")) {
    const r = cell.getBoundingClientRect();
    mapCellRects.set(cell.dataset.tileId, {
      x: r.left - stageRect.left,
      y: r.top - stageRect.top,
      w: r.width,
      h: r.height,
    });
  }
}
function fitMapCanvas() {
  const r = $("map-stage").getBoundingClientRect();
  mapCv.width = Math.max(1, Math.round(r.width));
  mapCv.height = Math.max(1, Math.round(r.height));
  mapLayoutVersion += 1;
  refreshMapCellRects();
}
new ResizeObserver(fitMapCanvas).observe($("map-stage"));
fitMapCanvas();

const MAP_NPC_COLORS = {
  adventurer: "#74d28f",
  crafter: "#e6a44f",
  bandit: "#d56f6f",
  merchant: "#e4cf6b",
  guard: "#7aa4e8",
  scout: "#7fc4a5",
  mystic: "#b68be8",
  player: "#ffffff",
};
function mapTilePoint(tileId, actorId = "", slot = null) {
  const tile = fullMap?.tiles?.[tileId];
  if (!tile || !fullMap?.width || !fullMap?.height) return null;
  const rect = mapCellRects.get(tileId);
  const cw = rect?.w || (mapCv.width / fullMap.width);
  const ch = rect?.h || (mapCv.height / fullMap.height);
  const seed = hash(actorId || tileId);
  const baseX = rect ? rect.x : tile.x * cw;
  const baseY = rect ? rect.y : tile.y * ch;
  const fx = 0.16 + ((seed & 0xff) / 255) * 0.68;
  const fy = 0.24 + (((seed >>> 8) & 0xff) / 255) * 0.56;
  const wobbleX = Math.sin((seed % 360) + performance.now() / 1800) * cw * 0.015;
  const wobbleY = Math.cos((seed % 360) + performance.now() / 2100) * ch * 0.012;
  return {
    x: baseX + cw * fx + wobbleX,
    y: baseY + ch * fy + wobbleY,
    cw,
    ch,
  };
}
function plannerStaleRatio() {
  if (!plannerDemo?.simulated) return 0;
  return Math.max(0, Math.min(0.96, (plannerDemo.staleNpcs || 0) / Math.max(1, plannerDemo.activeNpcs || 1)));
}
function actorFrozenByPlanner(actor) {
  if (!actor?.id || actor.id === "__player__") return false;
  if (actor.plannerState === "stale" || actor.plannerState === "queued") return true;
  const ratio = plannerStaleRatio();
  if (ratio <= 0) return false;
  return (hash(`${actor.id}:planner-freeze`) % 1000) < ratio * 1000;
}
function demoPartyTileId(npcId, info) {
  if (!demoRun || demoRun.committed) return null;
  const member = (demoRun.roster || []).find((r) => r.id === npcId && !r.isPlayer);
  if (!member) return null;
  if (info.stage === "combat" || info.stage === "results") return demoRun.targetTile?.id || null;
  if (info.stage === "travel") {
    const path = demoRun.travelPath || [];
    return path[Math.max(0, Math.min(path.length - 1, info.stepIndex || 0))]?.id || demoRun.startTile?.id || null;
  }
  return demoRun.startTile?.id || null;
}
function mapNpcTargetTile(npc, info) {
  return demoPartyTileId(npc.id, info) || npc.tileId;
}
function syncMapSprite(actor, tileId, ts, kind = "npc", slot = null) {
  const point = mapTilePoint(tileId, actor.id, slot);
  if (!point) return null;
  const plannerFrozen = kind === "npc" && actorFrozenByPlanner(actor);
  const plannerState = kind === "npc" ? actor.plannerState || null : null;
  let s = mapNpcSprites.get(actor.id);
  if (!s) {
    s = {
      id: actor.id,
      x: point.x,
      y: point.y,
      fromX: point.x,
      fromY: point.y,
      toX: point.x,
      toY: point.y,
      startedAt: ts,
      duration: 1,
      tileId,
      seed: hash(actor.id),
      pulseUntil: 0,
      plannerFrozen: false,
      plannerState: null,
      layoutVersion: mapLayoutVersion,
    };
    mapNpcSprites.set(actor.id, s);
  }
  if (s.layoutVersion !== mapLayoutVersion) {
    s.x = point.x; s.y = point.y; s.fromX = point.x; s.fromY = point.y; s.toX = point.x; s.toY = point.y;
    s.layoutVersion = mapLayoutVersion;
  }
  s.plannerFrozen = plannerFrozen;
  s.plannerState = plannerState;
  if (plannerFrozen) {
    s.fromX = s.x;
    s.fromY = s.y;
    s.toX = s.x;
    s.toY = s.y;
    s.startedAt = ts;
    s.duration = 1;
    return s;
  }
  if (s.tileId !== tileId) {
    s.fromX = s.x; s.fromY = s.y; s.toX = point.x; s.toY = point.y;
    s.startedAt = ts;
    s.duration = kind === "player" ? 1200 : 1900 + (s.seed % 900);
    s.tileId = tileId;
  } else {
    s.toX = point.x; s.toY = point.y;
  }
  const plannedAt = Number(actor.plannedAtTick || 0);
  if (kind === "npc" && plannedAt > 0 && mapPlanTicks.get(actor.id) !== plannedAt) {
    const recent = Number(snap?.worldTick || 0) - plannedAt <= 2;
    if (mapPlanTicks.has(actor.id) || recent) s.pulseUntil = ts + 2600;
    mapPlanTicks.set(actor.id, plannedAt);
  }
  return s;
}
function drawTinyMapSprite(actor, sprite, ts, kind = "npc") {
  const plannerState = kind === "npc" ? actor.plannerState || sprite.plannerState || null : null;
  const failedPlan = plannerState === "stale";
  const queuedPlan = plannerState === "queued";
  const frozen = kind === "npc" && sprite.plannerFrozen;
  const t = frozen ? 1 : Math.min(1, Math.max(0, (ts - sprite.startedAt) / Math.max(1, sprite.duration)));
  if (!frozen) {
    const eased = 0.5 - Math.cos(t * Math.PI) / 2;
    sprite.x = sprite.fromX + (sprite.toX - sprite.fromX) * eased;
    sprite.y = sprite.fromY + (sprite.toY - sprite.fromY) * eased;
  }
  const moving = !frozen && t < 1 && (Math.abs(sprite.fromX - sprite.toX) + Math.abs(sprite.fromY - sprite.toY)) > 1;
  const bob = frozen ? 0 : moving ? Math.sin(ts / 95 + sprite.seed) * 1.6 : Math.sin(ts / 700 + sprite.seed) * 0.7;
  const x = sprite.x;
  const y = sprite.y + bob;
  const planPulse = kind === "npc" && !frozen && sprite.pulseUntil > ts;
  const color = failedPlan ? "#d77474" : queuedPlan ? "#d8a657" : frozen ? "#7f8780" : kind === "player" ? MAP_NPC_COLORS.player : MAP_NPC_COLORS[actor.archetype] || "#d0ded6";
  mapCtx.save();
  mapCtx.translate(Math.round(x), Math.round(y));
  if (frozen) {
    const p = (Math.sin(ts / 180 + sprite.seed) + 1) / 2;
    mapCtx.globalAlpha = 0.58 + p * 0.24;
    mapCtx.strokeStyle = failedPlan ? "#ff3f5f" : queuedPlan ? "#d8a657" : "#d77474";
    mapCtx.lineWidth = 1.5;
    mapCtx.strokeRect(-6, -16, 12, 24);
    if (failedPlan) {
      mapCtx.globalAlpha = 1;
      mapCtx.fillStyle = "#ff3f5f";
      mapCtx.beginPath();
      mapCtx.arc(0, -22, 6, 0, Math.PI * 2);
      mapCtx.fill();
      mapCtx.fillStyle = "#22070b";
      mapCtx.font = "bold 10px system-ui";
      mapCtx.textAlign = "center";
      mapCtx.fillText("!", 0, -18);
      mapCtx.strokeStyle = "rgba(255,63,95,.82)";
      mapCtx.beginPath();
      mapCtx.moveTo(-7, -5);
      mapCtx.lineTo(7, 7);
      mapCtx.moveTo(7, -5);
      mapCtx.lineTo(-7, 7);
      mapCtx.stroke();
    } else {
      mapCtx.fillStyle = queuedPlan ? "#f1c15f" : "#ff9a8a";
      mapCtx.fillRect(-4, -14, 2, 8);
      mapCtx.fillRect(2, -14, 2, 8);
    }
    mapCtx.globalAlpha = 1;
  }
  if (planPulse) {
    const p = 1 - (sprite.pulseUntil - ts) / 2600;
    mapCtx.globalAlpha = Math.max(0, 1 - p);
    mapCtx.strokeStyle = actor.planSource === "gemma" ? "#b68be8" : "#f3d36b";
    mapCtx.lineWidth = 1.5;
    mapCtx.beginPath();
    mapCtx.arc(0, -7, 5 + p * 11, 0, Math.PI * 2);
    mapCtx.stroke();
    mapCtx.globalAlpha = 1;
    mapCtx.fillStyle = actor.planSource === "gemma" ? "#d9b4ff" : "#ffe38a";
    mapCtx.font = "10px system-ui";
    mapCtx.fillText("✦", -3, -15);
  }
  mapCtx.fillStyle = "rgba(0,0,0,.38)";
  mapCtx.fillRect(-3, 4, 7, 2);
  mapCtx.fillStyle = color;
  mapCtx.fillRect(-2, -5, 5, 8);
  mapCtx.fillStyle = kind === "player" ? "#7fc4a5" : "#f2d3a6";
  mapCtx.fillRect(-2, -9, 5, 4);
  mapCtx.fillStyle = moving ? "#111" : "rgba(0,0,0,.55)";
  mapCtx.fillRect(moving ? -4 : -3, 2, 2, 5);
  mapCtx.fillRect(moving ? 2 : 1, 2, 2, 5);
  if (kind === "player") {
    mapCtx.strokeStyle = "#7fc4a5";
    mapCtx.strokeRect(-4, -11, 9, 19);
  }
  mapCtx.restore();
}
function drawMapAgents(ts, info = playbackInfo(ts)) {
  if (!fullMap?.tiles || !snap?.worldMap) return;
  mapCtx.clearRect(0, 0, mapCv.width, mapCv.height);
  if (plannerDemo?.simulated) {
    mapCtx.save();
    mapCtx.fillStyle = "rgba(20,5,5,.82)";
    mapCtx.fillRect(8, 8, Math.min(310, mapCv.width - 16), 32);
    mapCtx.strokeStyle = "rgba(215,116,116,.62)";
    mapCtx.strokeRect(8.5, 8.5, Math.min(310, mapCv.width - 16), 32);
    mapCtx.fillStyle = "#ffb0a6";
    mapCtx.font = "bold 11px system-ui";
    mapCtx.fillText(`MODEL A: ${plannerDemo.staleNpcs || 0} LOGIC CYCLES FAILED · ${plannerDemo.queueDepth || 0} queued`, 18, 28);
    mapCtx.restore();
  }
  const active = new Set();
  const npcs = snap.worldMap.npcs || [];
  const mapped = npcs.map((npc) => ({ npc, tileId: mapNpcTargetTile(npc, info) })).filter((x) => x.tileId);
  for (const { npc, tileId } of mapped) {
    const sprite = syncMapSprite(npc, tileId, ts, "npc");
    if (!sprite) continue;
    active.add(npc.id);
    drawTinyMapSprite(npc, sprite, ts);
  }
  const playerTileId = currentDisplayTileId(info);
  const player = { id: "__player__", archetype: "player", plannedAtTick: 0 };
  const playerSprite = syncMapSprite(player, playerTileId, ts, "player");
  if (playerSprite) {
    active.add(player.id);
    drawTinyMapSprite(player, playerSprite, ts, "player");
  }
  for (const id of mapNpcSprites.keys()) {
    if (!active.has(id)) mapNpcSprites.delete(id);
  }
}

async function boot() {
  try {
    const [pt, mp, ph] = await Promise.all([
      fetch("/api/sigmacraft/playtest", { method: "POST" }).then(r => r.json()),
      fetch("/api/sigmacraft/map").then(r => r.json()),
      fetch("/api/sigmacraft/demo/throughput").then(r => r.json()),
    ]);
    token = pt.token; snap = pt.snapshot; fullMap = mp.map;
    plannerDemo = ph.planner || null;
    $("hdr-who").textContent = `playtest · ${token.slice(-6)}`;
    render();
    setInterval(refresh, 1500);
    setInterval(refreshPlannerDemo, 1500);
  } catch { $("hdr-meta").textContent = "failed to reach the realm"; }
}
async function refreshPlannerDemo() {
  try {
    const j = await (await fetch("/api/sigmacraft/demo/throughput")).json();
    if (j.ok) {
      plannerDemo = j.planner || plannerDemo;
      render_planner();
      render_map();
    }
  } catch { /* transient */ }
}
async function setPlannerProfile(profile) {
  if (demoRun && !demoRun.committed) {
    $("pending").textContent = "finish or reset the staged party run before changing planner speed";
    return;
  }
  try {
    const j = await (await fetch("/api/sigmacraft/demo/throughput", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ profile }),
    })).json();
    if (j.ok) {
      plannerDemo = j.planner || plannerDemo;
      render_planner();
      render_map();
    }
  } catch {
    $("pending").textContent = "planner speed toggle failed";
  }
}
async function refresh() {
  if (!token) return;
  if (demoRun && !demoRun.committed) return;
  try {
    const j = await (await fetch(`/api/sigmacraft/snapshot?token=${encodeURIComponent(token)}`)).json();
    if (j.ok) { snap = j.snapshot; render(); }
  } catch { /* transient */ }
}
async function act(intent) {
  if (!token) return;
  demoRun = null;
  $("pending").textContent = `… ${intent.kind}${intent.targetId ? " → " + intent.targetId : ""} (resolving next tick)`;
  try {
    await fetch("/api/sigmacraft/intent", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ token, intent: { ...intent, nonce: nonce() } }),
    });
    setTimeout(refresh, 600);
  } catch { /* ignore */ }
}

async function beginPartyRun() {
  if (!token || demoPending) return;
  demoPending = true;
  demoCommitStarted = false;
  demoRun = null;
  playbackStart = performance.now();
  playbackKey = "";
  $("pending").textContent = "posting the tavern notice…";
  render();
  try {
    const j = await (await fetch("/api/sigmacraft/demo/party-run", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ token }),
    })).json();
    if (j.ok) {
      demoRun = j;
      demoRun.committed = false;
      plannerDemo = j.plannerDemo || plannerDemo;
      snap = j.snapshot || snap;
      playbackStart = performance.now();
      $("pending").textContent = "";
    } else {
      $("pending").textContent = `party run: ${j.error || "failed"}`;
    }
  } catch {
    $("pending").textContent = "party run failed to reach the server";
  } finally {
    demoPending = false;
    render();
  }
}

async function commitPartyRun() {
  if (!token || !demoRun || demoRun.committed || demoCommitStarted) return;
  demoCommitStarted = true;
  try {
    const j = await (await fetch("/api/sigmacraft/demo/party-run/commit", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ token, runId: demoRun.runId }),
    })).json();
    if (j.ok) {
      demoRun.committed = true;
      snap = j.snapshot || snap;
      render();
    } else {
      $("pending").textContent = `party commit: ${j.error || "failed"}`;
    }
  } catch {
    $("pending").textContent = "party result failed to commit";
  }
}
async function queueDisband() {
  if (!token) return;
  try {
    await fetch("/api/sigmacraft/intent", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ token, intent: { kind: "disband", nonce: nonce() } }),
    });
    setTimeout(refresh, 700);
  } catch { /* best effort */ }
}
function resetPartyDemo() {
  demoRun = null;
  demoCommitStarted = false;
  playbackKey = "";
  document.body.classList.remove("dungeon-focus");
  $("result-card").classList.remove("show");
  render();
  queueDisband();
  setTimeout(refresh, 100);
}

// ── world map: the full overworld tile grid ─────────────────────────────────
let legendDrawn = false;
function currentDisplayTileId(info = playbackInfo(lastFrameTs || performance.now())) {
  if (!demoRun || demoRun.committed) return snap?.place?.id;
  if (info.stage === "travel") {
    const path = demoRun.travelPath || [];
    const idx = Math.max(0, Math.min(path.length - 1, info.stepIndex ?? 0));
    return path[idx]?.id || demoRun.startTile?.id || snap?.place?.id;
  }
  if (info.stage === "combat" || info.stage === "results") return demoRun.targetTile?.id || snap?.place?.id;
  return demoRun.startTile?.id || snap?.place?.id;
}
function render_map() {
  if (!fullMap?.tiles) return;
  const grid = $("map-grid");
  grid.style.gridTemplateColumns = `repeat(${fullMap.width}, 1fr)`;
  const reach = new Set((snap?.validActions || []).filter(a => a.kind === "move").map(a => a.targetId));
  const info = playbackInfo(lastFrameTs || performance.now());
  const curId = currentDisplayTileId(info);
  // live npcCounts for the windowed neighbourhood (the rest show 0)
  const counts = {};
  for (const c of (snap?.worldMap?.cells || [])) counts[c.id] = c.npcCount;
  const tiles = Object.values(fullMap.tiles).sort((a, b) => a.y - b.y || a.x - b.x);
  const npcCount = (snap?.worldMap?.npcs || []).length;
  const plannerLine = plannerDemo?.simulated
    ? `${plannerDemo.staleNpcs || 0}/${plannerDemo.activeNpcs || npcCount} NPC planners frozen by Model A`
    : `${npcCount} NPCs moving`;
  $("map-meta").textContent = `${tiles.length} tiles · ${plannerLine} · ${(snap?.occupants || []).length} here with you`;
  grid.innerHTML = "";
  for (const t of tiles) {
    const cell = document.createElement("div");
    const reachable = !demoRun && reach.has(t.id);
    const current = t.id === curId;
    cell.className = "map-cell" + (current ? " current" : "") + (reachable ? " exit" : "");
    cell.dataset.tileId = t.id;
    cell.style.background = tileBackground(t);
    cell.title = `${t.name} · ${t.type} · danger ${t.danger}`;
    const n = counts[t.id] || 0;
    cell.innerHTML = `<span class="glyph">${tileGlyph(t)}</span>` + (current ? `<span class="pin">◆</span>` : "") + (n > 0 ? `<span class="cnt">${n > 9 ? "9+" : n}</span>` : "");
    if (reachable) cell.onclick = () => act({ kind: "move", targetId: t.id });
    grid.appendChild(cell);
  }
  refreshMapCellRects();
  requestAnimationFrame(refreshMapCellRects);
  if (!legendDrawn) {
    const lg = $("map-legend");
    for (const [type, col] of Object.entries(TYPE_COLOR)) {
      lg.insertAdjacentHTML("beforeend", `<span><i class="sw" style="background:${col}"></i>${type}</span>`);
    }
    legendDrawn = true;
  }
}

function render_planner() {
  const p = plannerDemo;
  const health = $("planner-health");
  const fast = $("btn-profile-cerebras");
  const slow = $("btn-profile-slow50");
  const runningDemo = !!(demoRun && !demoRun.committed);
  if (fast) {
    fast.classList.toggle("active", p?.profile === "cerebras");
    fast.disabled = runningDemo;
    fast.onclick = () => setPlannerProfile("cerebras");
  }
  if (slow) {
    slow.classList.toggle("active", p?.profile === "slow50");
    slow.disabled = runningDemo;
    slow.onclick = () => setPlannerProfile("slow50");
  }
  if (!health) return;
  if (!p) {
    health.innerHTML = `<div class="dim">waiting for planner telemetry…</div>`;
    return;
  }
  const queuePct = Math.min(100, Math.round(((p.queueDepth || 0) / Math.max(1, p.activeNpcs || 1)) * 100));
  const deadline = Math.round((p.partyDeadlineMs || 30000) / 1000);

    `<div class="planner-top"><b>${esc(p.label)}</b><span>${p.tokensPerSecond} tk/s</span></div>` +
    `<div class="queuebar"><i style="width:${queuePct}%"></i></div>` +
    `<div class="planner-grid">` +
      `<div class="planner-metric ${p.queueDepth > 20 ? "bad" : "good"}"><span>queue</span><b>${p.queueDepth}</b></div>` +
      `<div class="planner-metric ${p.staleNpcs > 20 ? "bad" : "good"}"><span>stale NPCs</span><b>${p.staleNpcs}/${p.activeNpcs}</b></div>` +
      `<div class="planner-metric"><span>avg</span><b>${p.avgResponseMs}ms</b></div>` +
      `<div class="planner-metric ${p.p95ResponseMs > 3000 ? "bad" : "good"}"><span>p95</span><b>${p.p95ResponseMs}ms</b></div>` +
      `<div class="planner-metric ${p.capacityPer10s < p.demandPer10s ? "bad" : "good"}"><span>capacity</span><b>${p.capacityPer10s}/10s</b></div>` +
      `<div class="planner-metric"><span>demand</span><b>${p.demandPer10s}/10s</b></div>` +
      `<div class="planner-metric"><span>requested</span><b>${p.requestedJobs || 0}</b></div>` +
      `<div class="planner-metric good"><span>completed</span><b>${p.completedJobs || 0}</b></div>` +
      `<div class="planner-metric ${p.missedDeadlines ? "bad" : "good"}"><span>failed cycles</span><b>${p.missedDeadlines}</b></div>` +
      `<div class="planner-metric"><span>tick</span><b>${(p.worldTickMs || 3000) / 1000}s</b></div>` +
    `</div>` +

function visibleJoinDecisions(info = playbackInfo(lastFrameTs || performance.now())) {
  if (!demoRun) return [];
  return (demoRun.joinDecisions || [])
    .filter((d) => d.accepted && Number.isFinite(d.joinAtMs) && (info.elapsed ?? 0) >= d.joinAtMs)
    .slice(0, 4);

// Tavern: automated party finding for the playtest slice.
function render_tavern() {
  const wrap = $("tavern-wrap");
  const inTown = snap?.place && (snap.place.type === "town" || snap.place.type === "city");
  if (!inTown && !demoRun && !demoPending) { wrap.style.display = "none"; return; }
  wrap.style.display = "block";
  const info = playbackInfo(lastFrameTs || performance.now());
  const joined = visibleJoinDecisions(info);
  const members = demoRun ? joined.map((d) => ({ name: d.name, archetype: d.archetype })) : snap?.party?.members || [];
  const accepted = joined;
  const activeDemo = !!(demoRun && !demoRun.committed);
  const stalled = info.stage === "stalled";
  const unresolvedSlots = demoRun && (info.stage === "partyFind" || stalled) ? Math.max(0, 4 - joined.length) : 0;
  const declined = (demoRun?.joinDecisions || []).filter((d) => !d.accepted && (info.elapsed ?? 0) > 12000).slice(0, 3);
  $("party").innerHTML =
    `<button class="act primary" id="btn-party-run" ${demoPending || activeDemo ? "disabled" : ""}>${demoPending ? "Finding party…" : "Begin party finding"}</button>` +
    `<div class="party-hd" style="margin-top:7px">Party (${members.length}/4)${activeDemo ? ` · <span class="dim">${stalled ? "planner backlog" : "forming"}</span>` : snap?.party?.status && snap.party.status !== "forming" ? ` · <span class="dim">${esc(snap.party.status)}</span>` : ""}` +
    (members.length && !demoRun ? ` <button class="act tiny" id="btn-disband">Disband</button>` : "") +
    (stalled ? ` <button class="act tiny" id="btn-reset-demo">Reset</button>` : "") + `</div>` +
    (members.length
      ? `<ul class="party-list">` + members.map(m => `<li><b>${esc(m.name)}</b> <span class="dim">${esc(m.archetype || "")}</span></li>`).join("") + `</ul>`
      : `<div class="dim">${demoRun ? "The notice is up. People are thinking it over." : "The tavern board is waiting."}</div>`);
  $("btn-party-run").onclick = beginPartyRun;
  const disband = $("btn-disband");
  if (disband) disband.onclick = () => act({ kind: "disband" });

  if (reset) reset.onclick = resetPartyDemo;

  if (!demoRun) {
    const locals = (snap?.occupants || []).filter(o => o.kind === "npc").slice(0, 6);
    $("recruits").innerHTML = locals.length
      ? `<div class="dim" style="margin:.4rem 0 .2rem">In the room:</div>` + locals.map(o => `<span class="decision">${esc(o.name)} <span class="dim">${esc(o.archetype || "")}</span></span>`).join(" ")
      : "";
    return;
  }

  $("recruits").innerHTML =
    `<div class="decision-grid">` +
    accepted.map(d => `<div class="decision yes"><b>${esc(d.name)}</b>: "${esc(d.dialogue)}"</div>`).join("") +
    Array.from({ length: Math.min(4, unresolvedSlots) }).map(() => `<div class="decision"><b>Someone nearby</b> <span class="dim">is weighing the offer…</span></div>`).join("") +
    declined.map(d => `<div class="decision no"><b>${esc(d.name)}</b>: "${esc(d.dialogue)}"</div>`).join("") +
    `</div>`;
}

// Dungeon: automated wave playback from the server-resolved party run.

}
function render_combat(c) {
  const info = playbackInfo(lastFrameTs || performance.now());
  const oc = info.stage === "results" ? (c.outcome === "victory" ? "VICTORY" : c.outcome === "defeat" ? "DEFEAT" : "TIMEOUT") : "DELVE IN PROGRESS";
  const survivors = (c.party || []).map(p => `${esc(p.name)}${p.alive ? "" : " fallen"}${p.fled ? " (fled)" : ""}`).join(", ");
  const loot = (c.loot || []).length
    ? c.loot.map(l => `<li>${l.fromBoss ? "boss " : ""}<b>${esc(l.item?.name || "loot")}</b> <span class="dim">${esc(l.item?.rarity || "")}</span> → ${esc(l.to)}</li>`).join("")
    : `<li class="dim">no loot</li>`;
  const activeWave = info.waveIndex ?? -1;
  const wavePills = (c.waves || []).map((w, i) =>
    `<span class="wave-pill${i === activeWave ? " active" : ""}">${w.boss ? "Boss" : `Wave ${w.wave}`}</span>`

  roster.slice(0, 5).forEach((r, i) => {
    const state = partyStates.get(r.id) || {};
    const x = W * (0.18 + i * 0.065);
    const y = groundY - (i % 2) * 9;
    const anim = state.alive === false ? "sit" : current?.actor === r.id ? "slash" : current?.target === r.id ? "hurt" : "idle";
    composeAvatar(ctx, x, y, petFor(r, 1), ts, 0.62, anim);
    combatPoints.set(r.id, { x, y, radius: 18, hitOffset: 38 });
    drawCombatHpBar(state, x, y - 54, 38, false);
    drawLabel(i === 0 ? "You" : r.name, x, y - 59);
  });
  const enemies = wave?.enemies || [];
  enemies.forEach((e, i) => {
    const state = enemyStates.get(e.id) || withMaxHp(e);
    const x = W * (0.68 + i * 0.09);
    const y = groundY - (i % 2) * 10;
    const hit = current?.target === e.id;
    const defeated = state.alive === false || (state.hp || 0) <= 0;
    const anim = defeated ? "idle" : current?.actor === e.id ? "slash" : hit ? "hurt" : "idle";
    ctx.save();
    if (defeated) ctx.globalAlpha = 0.38;
    const drew = composeEnemy(ctx, x, y, e.lpc, anim, ts, e.isBoss ? 0.82 : 0.62, hit && !defeated, "left");
    if (!drew) drawFallbackEnemy(e, x, y, hit && !defeated);
    ctx.restore();
    if (defeated) drawDefeatedMarker(x, y, e.isBoss ? 46 : 30);
    combatPoints.set(e.id, { x, y, radius: e.isBoss ? 34 : 22, hitOffset: e.isBoss ? 48 : 34 });
    drawCombatHpBar(state, x, y - (e.isBoss ? 80 : 54), e.isBoss ? 56 : 38, true);
    drawLabel(e.name, x, y - (e.isBoss ? 88 : 60));
  });
  if (current) {
    drawDamageCue(current, combatPoints.get(current.target), ts);
  }
  if (info.stage === "results") {
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,.42)";
    ctx.fillRect(0, H * 0.12, W, 54);
    ctx.fillStyle = "#f5d37a";
    ctx.font = "bold 24px system-ui";
    ctx.textAlign = "center";
    ctx.fillText(demoRun?.bossDead ? "BOSS DEFEATED" : "FIGHT ENDED", W / 2, H * 0.12 + 34);
    ctx.restore();
  }
}
function drawTownScene(ts) {
  const W = cv.width, H = cv.height, groundY = H * 0.8;
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, "#273a35"); g.addColorStop(1, "#141b18");
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = "#47513c"; ctx.fillRect(0, groundY - 34, W, 34);
  const houses = [
    [0.06, 0.44, 58, 48, "#8b5a34"],
    [0.28, 0.38, 72, 58, "#6f4931"],
    [0.58, 0.42, 64, 50, "#946237"],
    [0.78, 0.36, 76, 62, "#7e5230"],
  ];
  for (const [px, py, w, h, col] of houses) {
    const x = W * px, y = H * py;
    ctx.fillStyle = "#4b211b"; ctx.beginPath(); ctx.moveTo(x - 7, y); ctx.lineTo(x + w / 2, y - 28); ctx.lineTo(x + w + 7, y); ctx.closePath(); ctx.fill();
    ctx.fillStyle = col; ctx.fillRect(x, y, w, h);
    ctx.fillStyle = "#f0c36b"; ctx.fillRect(x + w * 0.18, y + h * 0.24, 10, 12);
    ctx.fillStyle = "#2b1d16"; ctx.fillRect(x + w * 0.6, y + h * 0.42, 16, h * 0.58);
  }
  ctx.fillStyle = "#6d6044"; ctx.fillRect(0, groundY, W, H - groundY);
  for (let x = -20; x < W + 20; x += 22) {
    ctx.fillStyle = x % 44 ? "#7d7051" : "#5f543d";
    ctx.fillRect(x, groundY + 3, 16, 5);
  }
  composeAvatar(ctx, W * 0.25, groundY, petFor({ id: token || "player", name: "You", archetype: "player", isPlayer: true }, 1), ts, 0.72, "idle");
  drawLabel("You", W * 0.25, groundY - 72);
  (snap?.occupants || []).filter(o => o.kind === "npc").slice(0, 4).forEach((o, i) => {
    const x = W * (0.52 + i * 0.1);
    const y = groundY - (i % 2) * 8;
    composeAvatar(ctx, x, y, petFor(o, i % 2 ? 1 : -1), ts, 0.56, "idle");
  });
}
function drawBiomeScene(ts) {
  const W = cv.width, H = cv.height, groundY = H * 0.78;
  const place = snap?.place || {};
  const tile = fullMap?.tiles?.[place.id] || {};
  const terrain = place.terrain || tile.terrain || place.type || "wilds";
  const palette = {
    forest: ["#1f3828", "#0e1a12", "#223b24"],
    woods: ["#203629", "#0d1810", "#1e3321"],
    road: ["#40372a", "#181410", "#6f6045"],
    shrine: ["#243544", "#0b1118", "#263a48"],
    ruins: ["#32283b", "#120d18", "#4b4154"],
    dungeon: ["#311b1b", "#120909", "#3a2523"],
    wilds: ["#26392f", "#101812", "#27402d"],
  }[terrain] || ["#26392f", "#101812", "#27402d"];
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, palette[0]); g.addColorStop(1, palette[1]);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  if (terrain === "forest" || terrain === "woods" || place.type === "wilds") {
    for (let i = 0; i < 8; i += 1) {
      const x = (i * 73 + 28) % (W + 80) - 40;
      const h = 44 + (i % 3) * 18;
      ctx.fillStyle = "#182415"; ctx.fillRect(x + 10, groundY - h, 8, h);
      ctx.fillStyle = i % 2 ? "#2f5631" : "#244a2d";
      ctx.beginPath(); ctx.arc(x + 14, groundY - h - 8, 24, 0, Math.PI * 2); ctx.fill();
    }
  } else if (terrain === "road") {
    ctx.fillStyle = "#66583f"; ctx.fillRect(W * 0.2, groundY - 20, W * 0.6, 42);
  } else {
    ctx.fillStyle = "rgba(0,0,0,.25)";
    for (let i = 0; i < 5; i += 1) ctx.fillRect(W * (0.2 + i * 0.14), groundY - 28 - i % 2 * 10, 28, 34);
  }
  ctx.fillStyle = palette[2]; ctx.fillRect(0, groundY, W, H - groundY);
  composeAvatar(ctx, W * 0.24, groundY, petFor({ id: token || "player", name: "You", archetype: "player", isPlayer: true }, 1), ts, 0.72, "idle");
  drawLabel("You", W * 0.24, groundY - 72);
}
function drawScene(ts, info = playbackInfo(ts)) {
  ctx.imageSmoothingEnabled = false;
  if (info.stage === "partyFind" || info.stage === "stalled") drawTavern(ts, info);
  else if (info.stage === "travel") drawRoad(ts, info);
  else if (info.stage === "combat" || info.stage === "results") drawDungeon(ts, info);
  else {
    if (snap?.place?.type === "town" || snap?.place?.type === "city") drawTownScene(ts);
    else drawBiomeScene(ts);
  }
}
function updatePlaybackDom(info) {
  const focused = info.stage === "combat" || info.stage === "results";
  document.body.classList.toggle("dungeon-focus", focused);
  requestAnimationFrame(fit);
  if (!demoRun && !demoPending) {
    $("result-card").classList.remove("show");
    return;
  }
  if (info.stage === "partyFind") {
    $("scene-place").textContent = `${demoRun?.startTile?.name || snap?.place?.name || "Millbridge"} Tavern`;
    const joined = visibleJoinDecisions(info).length;
    $("scene-flavor").textContent = `Party finding: ${joined}/4 joined.`;
    $("result-card").classList.remove("show");
  } else if (info.stage === "stalled") {
    $("scene-place").textContent = `${demoRun?.startTile?.name || snap?.place?.name || "Millbridge"} Tavern`;
    const joined = visibleJoinDecisions(info).length;
    $("scene-flavor").textContent = `Planner backlog missed the 30s party deadline: ${joined}/4 joined, no automatic travel.`;
    $("pending").textContent = "planner backlog: NPC decisions are arriving too late for this MMO loop";
    $("result-card").classList.remove("show");
  } else if (info.stage === "travel") {
    const path = demoRun?.travelPath || [];
    const here = path[info.stepIndex || 0] || demoRun?.startTile;
    const next = path[Math.min(path.length - 1, (info.stepIndex || 0) + 1)] || demoRun?.targetTile;
    $("scene-place").textContent = here?.name || "On the road";
    $("scene-flavor").textContent = next?.id !== here?.id ? `Traveling toward ${next?.name}.` : `Arriving at ${demoRun?.targetTile?.name}.`;
    $("result-card").classList.remove("show");
  } else if (info.stage === "combat") {
    const wave = (demoRun?.waves || [])[Math.max(0, info.waveIndex || 0)];
    $("scene-place").textContent = `${demoRun?.targetTile?.name || snap?.place?.name || "Dungeon"} · ${wave?.title || "Combat"}`;
    $("scene-flavor").textContent = info.event ? eventText(info.event, demoRun) : "The party squares up in the dark.";
    $("result-card").classList.remove("show");
  } else if (info.stage === "results") {
    $("scene-place").textContent = `${demoRun?.targetTile?.name || "Dungeon"} · Results`;
    $("scene-flavor").textContent = demoRun?.bossDead ? "The boss is down. The party counts what survived." : "The fight is over. The party catches its breath.";
    renderResultCard();
    commitPartyRun();
  }
  render_map();
  render_tavern();
  render_dungeon();
}
function frame(ts) {
  lastFrameTs = ts;
  const info = playbackInfo(ts);
  if (info.key !== playbackKey) {
    playbackKey = info.key;
    updatePlaybackDom(info);
  }
  drawScene(ts, info);
  drawMapAgents(ts, info);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

boot();
</script>
